name: Build Minecraft Mods

on:
  push:
    branches: [ main, master ]
    paths:
      - '**/src/**'
      - '**/build.gradle'
      - '**/gradle.properties'
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:  # Allow manual trigger

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        mod-type: [fabric, forge, neoforge]
        include:
          - mod-type: fabric
            mod-dir: fabric-mod
          - mod-type: forge
            mod-dir: forge-mod
          - mod-type: neoforge
            mod-dir: neoforge-mod
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
    
    - name: Set up JDK 21
      uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: 'temurin'
    
    - name: Validate Gradle Wrapper
      run: |
        cd ${{ matrix.mod-dir }}
        if [ -f "gradlew" ]; then
          echo "Gradle wrapper found in ${{ matrix.mod-dir }}"
          echo "Gradle wrapper properties:"
          cat gradle/wrapper/gradle-wrapper.properties
          echo "--- Running gradlew --version ---"
          ./gradlew --version
        else
          echo "Error: gradlew not found in ${{ matrix.mod-dir }}"
          exit 1
        fi
    
    - name: Make gradlew executable
      run: chmod +x ${{ matrix.mod-dir }}/gradlew
    
    - name: Clean Gradle cache if needed
      run: |
        cd ${{ matrix.mod-dir }}
        # Clean gradle cache if previous build used different version
        rm -rf ~/.gradle/wrapper/dists/* 2>/dev/null || true
        rm -rf .gradle 2>/dev/null || true
    
    - name: Cache Gradle dependencies
      uses: actions/cache@v4
      with:
        path: |
          ~/.gradle/caches
          ~/.gradle/wrapper
          ${{ matrix.mod-dir }}/.gradle
        key: ${{ runner.os }}-gradle-${{ matrix.mod-type }}-${{ hashFiles('**/gradle-wrapper.properties', '**/build.gradle') }}
        restore-keys: |
          ${{ runner.os }}-gradle-${{ matrix.mod-type }}-
          ${{ runner.os }}-gradle-
    
    - name: Build with Gradle
      run: |
        cd ${{ matrix.mod-dir }}
        ./gradlew build --no-daemon
    
    - name: List build artifacts
      run: |
        cd ${{ matrix.mod-dir }}
        echo "Build outputs:"
        find . -name "*.jar" -type f | head -20
    
    - name: Upload build artifacts
      uses: actions/upload-artifact@v4
      with:
        name: ${{ matrix.mod-type }}-mod
        path: |
          ${{ matrix.mod-dir }}/build/libs/*.jar
          ${{ matrix.mod-dir }}/build/libs/*.jar
        retention-days: 7
    
    - name: Upload to GitHub Releases (on tag)
      if: startsWith(github.ref, 'refs/tags/')
      uses: softprops/action-gh-release@v1
      with:
        files: |
          ${{ matrix.mod-dir }}/build/libs/*.jar
        draft: false
        prerelease: false