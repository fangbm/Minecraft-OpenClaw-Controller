name: Build Minecraft Mods (Fixed)

on:
  push:
    branches: [ main, master ]
    paths:
      - '**/src/**'
      - '**/build.gradle'
      - '**/gradle.properties'
      - '**/gradle/wrapper/**'
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:  # Allow manual trigger

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        mod-type: [fabric, forge, neoforge]
        include:
          - mod-type: fabric
            mod-dir: fabric-mod
          - mod-type: forge
            mod-dir: forge-mod
          - mod-type: neoforge
            mod-dir: neoforge-mod
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        fetch-depth: 0  # 获取完整历史，确保所有文件
    
    - name: Set up JDK 21
      uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: 'temurin'
    
    - name: Make gradlew executable
      run: chmod +x ${{ matrix.mod-dir }}/gradlew
    
    - name: Validate Gradle Wrapper files
      run: |
        cd ${{ matrix.mod-dir }}
        echo "Checking Gradle Wrapper files in ${{ matrix.mod-dir }}..."
        
        # 检查 gradlew 脚本
        if [ ! -f "gradlew" ]; then
          echo "❌ Error: gradlew not found in ${{ matrix.mod-dir }}"
          exit 1
        fi
        
        # 检查 gradle-wrapper.jar
        if [ ! -f "gradle/wrapper/gradle-wrapper.jar" ]; then
          echo "❌ Error: gradle-wrapper.jar not found in ${{ matrix.mod-dir }}/gradle/wrapper/"
          exit 1
        fi
        
        # 检查 gradle-wrapper.jar 大小（应该 > 40KB）
        JAR_SIZE=$(stat -c%s "gradle/wrapper/gradle-wrapper.jar")
        if [ $JAR_SIZE -lt 40000 ]; then
          echo "❌ Error: gradle-wrapper.jar is too small ($JAR_SIZE bytes), may be corrupted"
          exit 1
        fi
        
        echo "✅ Gradle Wrapper files look good"
    
    - name: Test Gradle Wrapper
      run: |
        cd ${{ matrix.mod-dir }}
        echo "Testing Gradle Wrapper in ${{ matrix.mod-dir }}..."
        # 只运行简单的命令测试，不下载依赖
        ./gradlew --version 2>&1 | head -20 || echo "Gradle version check failed, will continue with build"
    
    - name: Cache Gradle dependencies
      uses: actions/cache@v4
      with:
        path: |
          ~/.gradle/caches
          ~/.gradle/wrapper
          ${{ matrix.mod-dir }}/.gradle
        key: ${{ runner.os }}-gradle-${{ matrix.mod-type }}-${{ hashFiles('**/gradle-wrapper.properties', '**/build.gradle', '**/gradle.properties', '**/gradle/wrapper/gradle-wrapper.jar') }}
        restore-keys: |
          ${{ runner.os }}-gradle-${{ matrix.mod-type }}-
    
    - name: Clean and Build with Gradle
      run: |
        cd ${{ matrix.mod-dir }}
        # 使用 --refresh-dependencies 强制刷新依赖，避免缓存问题
        ./gradlew clean build --no-daemon --refresh-dependencies
    
    - name: List build artifacts
      run: |
        cd ${{ matrix.mod-dir }}
        echo "Build outputs in ${{ matrix.mod-dir }}:"
        find build/libs -name "*.jar" -type f 2>/dev/null | head -20 || echo "No jar files found"
    
    - name: Upload build artifacts
      uses: actions/upload-artifact@v4
      with:
        name: ${{ matrix.mod-type }}-mod
        path: |
          ${{ matrix.mod-dir }}/build/libs/*.jar
        retention-days: 7
    
    - name: Upload to GitHub Releases (on tag)
      if: startsWith(github.ref, 'refs/tags/')
      uses: softprops/action-gh-release@v1
      with:
        files: |
          ${{ matrix.mod-dir }}/build/libs/*.jar
        draft: false
        prerelease: false