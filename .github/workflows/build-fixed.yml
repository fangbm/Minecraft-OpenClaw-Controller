name: Build & Release Minecraft OpenClaw Controller 🎮

on:
  push:
    branches: [ main, master ]
    tags: [ 'v*' ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:
    inputs:
      version:
        description: 'Version tag (e.g., v1.0.0)'
        required: false
        default: ''
      prerelease:
        description: 'Is this a prerelease?'
        type: boolean
        default: false

env:
  JAVA_VERSION: '21'
  JAVA_DISTRIBUTION: 'temurin'
  MC_VERSION: '1.21.1'

jobs:
  validate:
    name: 🔍 Validate Project Structure
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Check all modules exist
        run: |
          echo "🔍 Validating project structure..."
          for dir in fabric-mod forge-mod neoforge-mod; do
            if [ ! -d "$dir" ]; then
              echo "❌ Error: $dir directory not found"
              exit 1
            fi
            if [ ! -f "$dir/gradlew" ]; then
              echo "❌ Error: $dir/gradlew not found"
              exit 1
            fi
            if [ ! -f "$dir/gradle/wrapper/gradle-wrapper.jar" ]; then
              echo "❌ Error: $dir/gradle/wrapper/gradle-wrapper.jar not found"
              exit 1
            fi
            echo "✅ $dir structure valid"
          done

  build:
    name: 🏗️ Build ${{ matrix.mod-type }} Module
    needs: validate
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false  # 一个失败不终止其他
      matrix:
        include:
          - mod-type: fabric
            mod-dir: fabric-mod
            display-name: "Fabric"
          - mod-type: forge
            mod-dir: forge-mod
            display-name: "Forge"
          - mod-type: neoforge
            mod-dir: neoforge-mod
            display-name: "NeoForge"
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: ${{ env.JAVA_DISTRIBUTION }}
          cache: 'gradle'

      - name: Validate Gradle Wrapper
        uses: gradle/wrapper-validation-action@v2

      - name: Make gradlew executable
        working-directory: ${{ matrix.mod-dir }}
        run: chmod +x gradlew

      - name: Build ${{ matrix.display-name }} Mod
        working-directory: ${{ matrix.mod-dir }}
        run: |
          echo "::group::Building ${{ matrix.display-name }} Mod"
          ./gradlew clean build --no-daemon --stacktrace
          echo "::endgroup::"

      - name: Process artifacts
        id: process
        working-directory: ${{ matrix.mod-dir }}
        run: |
          # 查找主 jar 文件（排除 dev/sources/shadow）
          JAR_FILE=$(find build/libs -name "*.jar" ! -name "*-dev.jar" ! -name "*-sources.jar" ! -name "*-shadow.jar" -type f | head -1)
          
          if [ -z "$JAR_FILE" ]; then
            echo "❌ No valid jar file found in ${{ matrix.mod-dir }}/build/libs/"
            ls -la build/libs/ || echo "Directory not found"
            exit 1
          fi
          
          echo "📦 Found: $JAR_FILE"
          
          # 提取版本号
          MOD_VERSION=$(grep "^version=" gradle.properties 2>/dev/null | cut -d'=' -f2 | tr -d ' \r' || echo "unknown")
          BUILD_TIME=$(date +%Y%m%d-%H%M%S)
          
          # 创建标准化文件名: openclaw-{type}-{mcversion}-{modversion}.jar
          OUTPUT_NAME="openclaw-${{ matrix.mod-type }}-${MC_VERSION}-${MOD_VERSION}.jar"
          
          # 复制到根目录 artifacts
          mkdir -p ../artifacts
          cp "$JAR_FILE" "../artifacts/$OUTPUT_NAME"
          
          echo "✅ Packaged: $OUTPUT_NAME"
          echo "jar_path=$OUTPUT_NAME" >> $GITHUB_OUTPUT
          echo "mod_version=$MOD_VERSION" >> $GITHUB_OUTPUT

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.mod-type }}-build
          path: artifacts/*.jar
          retention-days: 30
          if-no-files-found: error

  release:
    name: 🚀 Create Release
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v') || github.event.inputs.version != ''
    permissions:
      contents: write
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # 获取完整历史用于生成 changelog

      - name: Determine version
        id: version
        run: |
          if [ "${{ github.event.inputs.version }}" != "" ]; then
            VERSION="${{ github.event.inputs.version }}"
          else
            VERSION="${GITHUB_REF#refs/tags/}"
          fi
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "📋 Version: $VERSION"

      - name: Check prerelease
        id: prerelease_check
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          if [[ "$VERSION" =~ (alpha|beta|rc|pre|dev) ]] || [ "${{ github.event.inputs.prerelease }}" == "true" ]; then
            echo "is_prerelease=true" >> $GITHUB_OUTPUT
            echo "⚠️ This is a prerelease"
          else
            echo "is_prerelease=false" >> $GITHUB_OUTPUT
            echo "✅ This is a stable release"
          fi

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-files
          pattern: '*-build'
          merge-multiple: true

      - name: List release files
        run: |
          echo "📁 Release files:"
          ls -lh release-files/

      - name: Generate Release Notes
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          
          cat > RELEASE_NOTES.md << 'EOF'
          ## 🎮 Minecraft OpenClaw Controller ${{ steps.version.outputs.version }}
          
          客户端 WebSocket 连接控制器，支持 Fabric/Forge/NeoForge 1.21.1
          
          ### 📦 下载
          
          | 模组加载器 | 文件名 | 支持版本 |
          |-----------|--------|---------|
          EOF
          
          for file in release-files/*.jar; do
            filename=$(basename "$file")
            if [[ $filename == *fabric* ]]; then
              echo "| Fabric | \`$filename\` | 1.21.1 |" >> RELEASE_NOTES.md
            elif [[ $filename == *forge* && $filename != *neoforge* ]]; then
              echo "| Forge | \`$filename\` | 1.21.1 |" >> RELEASE_NOTES.md
            elif [[ $filename == *neoforge* ]]; then
              echo "| NeoForge | \`$filename\` | 1.21.1 |" >> RELEASE_NOTES.md
            fi
          done
          
          cat >> RELEASE_NOTES.md << 'EOF'
          
          ### 📝 更新日志
          
          EOF
          
          # 获取上一个 tag 到现在的提交
          if git describe --tags --abbrev=0 HEAD^ 2>/dev/null; then
            PREVIOUS_TAG=$(git describe --tags --abbrev=0 HEAD^)
            echo "**自 [$PREVIOUS_TAG](https://github.com/${{ github.repository }}/releases/tag/$PREVIOUS_TAG) 以来的更改:**" >> RELEASE_NOTES.md
            echo "" >> RELEASE_NOTES.md
            git log --no-merges --format="- %s (%h)" "$PREVIOUS_TAG"..HEAD >> RELEASE_NOTES.md
          else
            echo "**首次发布** 🎉" >> RELEASE_NOTES.md
          fi
          
          cat >> RELEASE_NOTES.md << 'EOF'
          
          ### 🔧 安装方法
          
          1. 根据你使用的模组加载器下载对应文件
          2. 将 `.jar` 文件放入 Minecraft 的 `mods` 文件夹
          3. 启动游戏
          4. 按 `C` 键打开配置界面，设置 OpenClaw 服务器地址
          5. 按 `V` 键查看连接状态
          
          ### ⚙️ 默认配置
          
          - 服务器地址: `localhost`
          - 服务器端口: `8080`
          - 配置文件位置: `.minecraft/config/client-controller.properties`
          
          EOF
          
          cat RELEASE_NOTES.md

      - name: Create GitHub Release
        uses: ncipollo/release-action@v1
        with:
          tag: ${{ steps.version.outputs.version }}
          name: "Release ${{ steps.version.outputs.version }}"
          bodyFile: RELEASE_NOTES.md
          artifacts: "release-files/*.jar"
          draft: false
          prerelease: ${{ steps.prerelease_check.outputs.is_prerelease }}
          token: ${{ secrets.GITHUB_TOKEN }}
          makeLatest: true
          allowUpdates: true  # 允许更新已存在的 Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  cleanup:
    name: 🧹 Cleanup
    needs: [build, release]
    runs-on: ubuntu-latest
    if: always()
    permissions:
      actions: write  # 添加这行权限
    
    steps:
      - name: Delete workflow artifacts (optional)
        uses: geekyeggo/delete-artifact@v4
        with:
          name: |
            fabric-build
            forge-build
            neoforge-build
          failOnError: false
